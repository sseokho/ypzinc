<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="format-detection" content="telephone=no, email=no, address=no">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>영풍안전교육관리시스템</title>
  <link type="text/css" rel="stylesheet" href="././resource/css/base.css">


</head>

<body>
  <div id="wrap">
    <header class="header main">
      <div class="inner">
        <div class="head-logo">
          <a href="#none"><img src="./././resource/image/logo-yellow.svg" alt=""></a>
        </div>
        <div class="btn-wrap">
          <button type="button" class="btn btn-font size-14 fw-500"><span class="default">큰글씨</span><span
              class="active">기본글씨</span></button>
        </div>
      </div>
    </header>
    <div class="content">
      <div class="inner">
        <div class="sub-tit-wrap">
          <p class="txt size-26 fw-500 ta-l">2026 상반기 정기교육</p>
          <p class="txt size-14 error fw-500 ta-l">* 중도 퇴실 시, 교육 미이수 처리가 됩니다.
            또한, 미이수 여부에 관해 관리자가 증빙자료를 요청할 수 있습니다.</p>
        </div>
        <div class="opt-wrap">
          <div class="opt-txt justify-between direction-column">
            <p class="txt size-20 fw-600">중도 퇴실하는 이유는 무엇입니까?</p>
          </div>
          <ul class="opt-list radio vertical">
            <li>
              <div class="item">
                <input type="radio" name="one" id="one-radio_1"><label class="size-18 fw-400" for="one-radio_1">업무 인수인계</label>
              </div>
            </li>
            <li>
              <div class="item">
                <input type="radio" name="one" id="one-radio_2"><label class="size-18 fw-400" for="one-radio_2">업무 이슈</label>
              </div>
            </li>
            <li>
              <div class="item">
                <input type="radio" name="one" id="one-radio_3"><label class="size-18 fw-400" for="one-radio_3">질병</label>
              </div>
            </li>
            <li>
              <div class="item">
                <input type="radio" name="one" id="one-radio_4"><label class="size-18 fw-400" for="one-radio_4">연차</label>
              </div>
            </li>
            <li>
              <div class="item">
                <input type="radio" name="one" id="one-radio_5"><label class="size-18 fw-400" for="one-radio_5">기타</label>
                <div class="item-in">
                  <textarea class="w-full size-15 h-110" id="message" name="message" placeholder="상세 사유를 입력해주세요."></textarea>
                  <p class="txt size-14 error fw-600">※ 필수 입력 항목입니다.</p>
                </div>
              </div>
            </li>
          </ul>
        </div>
        <div class="btn-wrap d-flex justify-center">
          <button class="btn btn-gray h-54 size-20">취소</button>
          <button class="btn btn-yellow h-54 size-20" disabled>완료</button>
        </div>
      </div>
    </div>
  </div>

</body>

<script type="text/javascript" src="././resource/js/jquery-1.12.4.min.js"></script>
<script type="text/javascript" src="././resource/js/common.js"></script>





</html>
