<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="format-detection" content="telephone=no, email=no, address=no">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>영풍안전교육관리시스템</title>
  <link type="text/css" rel="stylesheet" href="././resource/css/base.css">


</head>

<body>
  <div id="wrap">
    <header class="header main">
      <div class="inner">
        <div class="head-logo">
    <a href="#none"><img src="./././resource/image/logo-yellow.svg" alt=""></a>
  </div>
  <div class="btn-wrap">
    <button type="button" class="btn btn-font size-14 fw-500"><span class="default">큰글씨</span><span class="active">기본글씨</span></button>
  </div>
      </div>
    </header>
    <div class="content">
      <div class="inner">
        <div class="sub-tit-wrap">
          <p class="txt size-26 fw-500 ta-l">교육 만족도 평가</p>
          <p class="txt size-14 error fw-500 ta-l">※ 주의, 단계를 완료하지 않고 중단하면 이수처리가 되지 않습니다.</p>
        </div>
        <div class="opt-wrap">
          <div class="opt-txt justify-between">
            <p class="txt size-20 fw-600">1. 본 교육의 전체 만족도는 어떠했습니까?</p>
          </div>
          <ul class="opt-list radio vertical">
            <li>
              <div class="item">
                <input type="radio" name="one" id="one-radio_1">
                <label class="size-18 fw-400" for="one-radio_1">매우 만족</label>
              </div>
            </li>
            <li>
              <div class="item">
                <input type="radio" name="one" id="one-radio_2">
                <label class="size-18 fw-400" for="one-radio_2">만족</label>
              </div>
            </li>
            <li>
              <div class="item">
                <input type="radio" name="one" id="one-radio_3">
                <label class="size-18 fw-400" for="one-radio_3">보통</label>
              </div>
            </li>
            <li>
              <div class="item">
                <input type="radio" name="one" id="one-radio_4">
                <label class="size-18 fw-400" for="one-radio_4">불만족</label>
              </div>
            </li>
            <li>
              <div class="item">
                <input type="radio" name="one" id="one-radio_5">
                <label class="size-18 fw-400" for="one-radio_5">매우 불만족</label>
              </div>
            </li>
          </ul>
        </div>
        <div class="opt-wrap">
          <div class="opt-txt justify-between">
            <p class="txt size-20 fw-600">2. 교육시간은 적절하였습니까?</p>
          </div>
          <ul class="opt-list radio vertical">
            <li>
              <div class="item">
                <input type="radio" name="two" id="two-radio_1">
                <label class="size-18 fw-400" for="two-radio_1">매우 만족</label>
              </div>
            </li>
            <li>
              <div class="item">
                <input type="radio" name="two" id="two-radio_2">
                <label class="size-18 fw-400" for="two-radio_2">만족</label>
              </div>
            </li>
            <li>
              <div class="item">
                <input type="radio" name="two" id="two-radio_3">
                <label class="size-18 fw-400" for="two-radio_3">보통</label>
              </div>
            </li>
            <li>
              <div class="item">
                <input type="radio" name="two" id="two-radio_4">
                <label class="size-18 fw-400" for="two-radio_4">불만족</label>
              </div>
            </li>
            <li>
              <div class="item">
                <input type="radio" name="two" id="two-radio_5">
                <label class="size-18 fw-400" for="two-radio_5">매우 불만족</label>
              </div>
            </li>
          </ul>
        </div>
        <div class="opt-wrap">
          <div class="opt-txt justify-between">
            <p class="txt size-20 fw-600">3. 본 교육이 안전 의식 교육에 도움이 되었습니까?</p>
          </div>
          <ul class="opt-list radio vertical">
            <li>
              <div class="item">
                <input type="radio" name="three" id="three-radio_1">
                <label class="size-18 fw-400" for="three-radio_1">매우 만족</label>
              </div>
            </li>
            <li>
              <div class="item">
                <input type="radio" name="three" id="three-radio_2">
                <label class="size-18 fw-400" for="three-radio_2">만족</label>
              </div>
            </li>
            <li>
              <div class="item">
                <input type="radio" name="three" id="three-radio_3">
                <label class="size-18 fw-400" for="three-radio_3">보통</label>
              </div>
            </li>
            <li>
              <div class="item">
                <input type="radio" name="three" id="three-radio_4">
                <label class="size-18 fw-400" for="three-radio_4">불만족</label>
              </div>
            </li>
            <li>
              <div class="item">
                <input type="radio" name="three" id="three-radio_5">
                <label class="size-18 fw-400" for="three-radio_5">매우 불만족</label>
              </div>
            </li>
          </ul>
        </div>
        <div class="btn-wrap d-flex justify-center">
          <button class="btn btn-yellow h-54 size-20" disabled>완료</button>
        </div>
      </div>
    </div>
  </div>

</body>


<script type="text/javascript" src="././resource/js/jquery-1.12.4.min.js"></script>
<script type="text/javascript" src="././resource/js/common.js"></script>

</html>
