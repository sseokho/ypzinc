<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="format-detection" content="telephone=no, email=no, address=no">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>영풍안전교육관리시스템</title>
  <link type="text/css" rel="stylesheet" href="././resource/css/base.css">


</head>

<body>
  <div id="wrap">
    <header class="header">
      <div class="inner">
        <div class="btn-wrap">
          <button type="button" class="btn btn-font size-14 fw-500"><span class="default">큰글씨</span><span class="active">기본글씨</span></button>
        </div>
      </div>
    </header>
    <div class="content">
      <div class="inner">
        <div class="logo-wrap">
          <span><img src="./resource/image/logo-black.svg"></span>
        </div>
        <div class="multi-box info">
          <div class="tit-wrap">
            <p class="txt size-36 fw-700 ta-c">2026<br> 상반기 정기교육</p>
          </div>
          <ul class="info__list">
            <li class="team"><i><img src="./resource/image/info-team.svg"/></i><span class="size-18 fw-500">안전기획팀</span></li>
            <li class="name"><i><img src="./resource/image/info-name.svg"/></i><span class="size-18 fw-500">홍길동</span></li>
            <li class="number"><i><img src="./resource/image/info-number.svg"/></i><span class="size-18 fw-500">010-4924-5023</span></li>
          </ul>
          <div class="btn-wrap">
            <button class="btn btn-yellow h-54 w-full size-20">출석 인증 시작</button>
          </div>
          <!-- 현재 기준 삭제
            <div class="tip-box">
              <p class="txt size-14 fw-400 ta-c">본인 정보가 다를 시, 관리자에게 말씀해 주세요.</p>
            </div>
          -->
        </div>
      </div>
    </div>

  </div>

</body>


<script type="text/javascript" src="././resource/js/jquery-1.12.4.min.js"></script>
<script type="text/javascript" src="././resource/js/common.js"></script>


</html>
