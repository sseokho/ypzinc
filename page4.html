<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="format-detection" content="telephone=no, email=no, address=no">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>영풍안전교육관리시스템</title>
  <link type="text/css" rel="stylesheet" href="././resource/css/base.css">


</head>

<body>
  <div id="wrap">
    <header class="header main">
      <div class="inner">
        <div class="head-logo">
          <a href="#none"><img src="./././resource/image/logo-yellow.svg" alt=""></a>
        </div>
        <div class="btn-wrap">
          <button type="button" class="btn btn-font size-14 fw-500"><span class="default">큰글씨</span><span
              class="active">기본글씨</span></button>
        </div>
      </div>
    </header>
    <div class="content">
      <div class="inner">
        <div class="tit-wrap">
          <p class="txt size-36 fw-700 ta-c">2026<br> 상반기 정기교육</p>
        </div>
        <div class="multi-box icon">
          <div class="icon-wrap">
            <span><img src="./resource/image/icon-edu-ing.svg"></span>
          </div>
          <div class="txt-wrap">
            <p class="txt size-22 fw-700 ta-c txt-status">교육 진행 중</p>
            <p class="txt size-18 fw-500 ta-c txt-time"><span class="time">15:12</span> 출석</p>
          </div>
        </div>
        <div class="multi-box txt">
          <div class="txt-wrap">
            <p class="txt size-18 fw-400 ta-c">
              홍길동 님,<br>
              2026년 상반기 정기교육 이수 중입니다.
            </p>
          </div>
        </div>
        <div class="btn-wrap d-flex justify-center">
          <button class="btn btn-red h-54 size-20">중도 퇴실</button>
        </div>
      </div>
    </div>

  </div>

</body>


<script type="text/javascript" src="././resource/js/jquery-1.12.4.min.js"></script>
<script type="text/javascript" src="././resource/js/common.js"></script>


</html>
