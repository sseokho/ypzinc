<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="format-detection" content="telephone=no, email=no, address=no">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>영풍안전교육관리시스템</title>
  <link type="text/css" rel="stylesheet" href="././resource/css/base.css">


</head>

<body>
  <div id="wrap">
    <header class="header main">
      <div class="inner">
        <div class="head-logo">
          <a href="#none"><img src="./././resource/image/logo-yellow.svg" alt=""></a>
        </div>
        <div class="btn-wrap">
          <button type="button" class="btn btn-font size-14 fw-500"><span class="default">큰글씨</span><span
              class="active">기본글씨</span></button>
        </div>
      </div>
    </header>
    <div class="content">
      <div class="inner">
        <div class="tit-wrap">
          <p class="txt size-36 fw-700 ta-c">산업안전보건법령 및 산업재해보상보험 제도에 관한산업안전보건법령 및 산업재해보상보험 제도에 관한산업안전보건법령 및 산업재해보상보험 제도에 관한</p>
        </div>
        <!-- 인증번호 틀렸을 때 multi-box에 expire 클래스 추가 -->
        <div class="multi-box number">
          <div class="txt-wrap">
            <p class="txt size-18 fw-400 ta-c">인증번호 4자리를 입력해주세요.</p>
          </div>
          <div class="pin-wrap">
            <input type="text" class="size-36 fw-700" inputmode="numeric" maxlength="1">
            <input type="text" class="size-36 fw-700" inputmode="numeric" maxlength="1">
            <input type="text" class="size-36 fw-700" inputmode="numeric" maxlength="1">
            <input type="text" class="size-36 fw-700" inputmode="numeric" maxlength="1">
          </div>
          <div class="timer size-22 ta-c" id="timer">05 : 00</div>
          <div class="expire-text size-14 fw-400 ta-c" id="expireText">
            * 인증번호를 확인해 주세요.
          </div>
        </div>
        <div class="btn-wrap">
          <button class="btn btn-yellow h-54 w-full size-20">출석 완료</button>
        </div>
        <div class="tip-box">
          <p class="txt size-14 fw-400 ta-c">문자 인증번호 4자리 수신 후 입력하는 과정입니다</p>
          <p class="txt size-14 error fw-400 ta-c">페이지를 나갈 경우 재인증 하셔야합니다.</p>
        </div>
      </div>
    </div>

  </div>

</body>


<script type="text/javascript" src="././resource/js/jquery-1.12.4.min.js"></script>
<script type="text/javascript" src="././resource/js/common.js"></script>


</html>
