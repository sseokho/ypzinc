<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="format-detection" content="telephone=no, email=no, address=no">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>영풍안전교육관리시스템</title>
  <link type="text/css" rel="stylesheet" href="././resource/css/base.css">


</head>

<body>
  <div id="wrap">
    <header class="header main">
      <div class="inner">
        <div class="head-logo">
    <a href="#none"><img src="./././resource/image/logo-yellow.svg" alt=""></a>
  </div>
  <div class="btn-wrap">
    <button type="button" class="btn btn-font size-14 fw-500"><span class="default">큰글씨</span><span class="active">기본글씨</span></button>
  </div>
      </div>
    </header>
    <div class="content">
      <div class="inner">
        <div class="sub-tit-wrap">
          <p class="txt size-26 fw-500 ta-l">시험 평가</p>
          <p class="txt size-14 error fw-500 ta-l">※ 주의, 단계를 완료하지 않고 중단하면 이수처리가 되지 않습니다.</p>
        </div>
        <div class="opt-wrap">
          <div class="opt-txt justify-between">
            <p class="txt size-20 fw-600">1. 산업안전보건법의 목적은 무엇입니까?</p>
          </div>
          <ul class="opt-list radio vertical">
            <li>
              <div class="item">
                <input type="radio" name="one" id="one-radio_1">
                <label class="size-18" for="one-radio_1">근로자의 안전과 건강 확보</label>
              </div>
            </li>
            <li>
              <div class="item">
                <input type="radio" name="one" id="one-radio_2">
                <label class="size-18" for="one-radio_2">사업주의 비용 절감</label>
              </div>
            </li>
            <li>
              <div class="item">
                <input type="radio" name="one" id="one-radio_3">
                <label class="size-18" for="one-radio_3">작업 효율성 향상</label>
              </div>
            </li>
            <li>
              <div class="item">
                <input type="radio" name="one" id="one-radio_4">
                <label class="size-18" for="one-radio_4">생산량 증가</label>
              </div>
            </li>
          </ul>
        </div>
        <div class="opt-wrap">
          <div class="opt-txt justify-between">
            <p class="txt size-20 fw-600">2. 작업 전 안전점검의 주된 목적은 무엇입니까?</p>
          </div>
          <ul class="opt-list radio vertical">
            <li>
              <div class="item">
                <input type="radio" name="two" id="two-radio_1">
                <label class="size-18" for="two-radio_1">업무 속도 향상</label>
              </div>
            </li>
            <li>
              <div class="item">
                <input type="radio" name="two" id="two-radio_2">
                <label class="size-18" for="two-radio_2">위험 요소 미리 예방</label>
              </div>
            </li>
            <li>
              <div class="item">
                <input type="radio" name="two" id="two-radio_3">
                <label class="size-18" for="two-radio_3">위험 요소 미리 점검</label>
              </div>
            </li>
            <li>
              <div class="item">
                <input type="radio" name="two" id="two-radio_4">
                <label class="size-18" for="two-radio_4">사고 예방</label>
              </div>
            </li>
          </ul>
        </div>
        <div class="opt-wrap">
          <div class="opt-txt justify-between">
            <p class="txt size-20 fw-600">3. 화재 발생 시, 가장 먼저 진행 해야하는 방법은?</p>
          </div>
          <ul class="opt-list radio vertical">
            <li>
              <div class="item">
                <input type="radio" name="three" id="three-radio_1">
                <label class="size-18" for="three-radio_1">소화기 위치 확인</label>
              </div>
            </li>
            <li>
              <div class="item">
                <input type="radio" name="three" id="three-radio_2">
                <label class="size-18" for="three-radio_2">비상벨 울리기</label>
              </div>
            </li>
            <li>
              <div class="item">
                <input type="radio" name="three" id="three-radio_3">
                <label class="size-18" for="three-radio_3">119 신고</label>
              </div>
            </li>
            <li>
              <div class="item">
                <input type="radio" name="three" id="three-radio_4">
                <label class="size-18" for="three-radio_4">화재 발생 이유 파악</label>
              </div>
            </li>
          </ul>
        </div>
        <div class="btn-wrap d-flex justify-center">
          <button class="btn btn-gray h-54 size-20">취소</button>
          <button class="btn btn-yellow h-54 size-20" disabled>완료</button>
        </div>
      </div>
    </div>
  </div>

</body>


<script type="text/javascript" src="././resource/js/jquery-1.12.4.min.js"></script>
<script type="text/javascript" src="././resource/js/common.js"></script>


</html>
